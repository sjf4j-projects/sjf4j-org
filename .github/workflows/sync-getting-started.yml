name: Sync Getting Started

on:
  workflow_dispatch:
  schedule:
    - cron: '15 2 * * *'

permissions:
  contents: write

jobs:
  sync-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout online branch
        uses: actions/checkout@v4
        with:
          ref: online
          fetch-depth: 0

      - name: Fetch README from sjf4j
        run: |
          curl -fsSL "https://raw.githubusercontent.com/sjf4j-projects/sjf4j/main/README.md" -o docs/getting_started.md

      - name: Commit changes if needed
        run: |
          if git diff --quiet -- docs/getting_started.md; then
            echo "No changes in upstream README."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/getting_started.md
          git commit -m "docs: sync getting_started from sjf4j README"
          git push origin HEAD:online
